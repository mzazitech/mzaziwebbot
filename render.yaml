# render.yaml
services:
  - type: web
    name: cyberbyte-ai-bot
    runtime: node
    repo: https://github.com/mzazitech/mzaziwebbot   # ⬅️ Replace with your repo
    plan: free                                               # Change as needed
    region: oregon                                            # Choose your region
    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js
    healthCheckPath: /api/health
    envVars:
      # Clerk keys – set these manually in Render dashboard for security (sync: false)
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      # Panel password – also set manually
      - key: PANEL_PASSWORD
        sync: false
      # Node environment
      - key: NODE_ENV
        value: production
